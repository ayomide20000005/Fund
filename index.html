<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fund — Phishing Detector</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Result Panel -->
  <div id="panel" class="panel hidden">
    <div class="panel-header">
      <span id="panel-badge" class="badge"></span>
      <button id="close-btn" class="close-btn">✕</button>
    </div>
    <p id="panel-verdict" class="verdict"></p>
    <p id="panel-reason" class="reason"></p>
    <img id="panel-thumb" class="thumb hidden" alt="screenshot"/>
  </div>

  <!-- FAB -->
  <button id="fab" title="Scan for phishing">
    <svg id="fab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      <line x1="11" y1="8" x2="11" y2="14"/>
      <line x1="8" y1="11" x2="14" y2="11"/>
    </svg>
    <svg id="spinner" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="20"/>
    </svg>
    <span id="fab-count" class="fab-count hidden"></span>
  </button>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
